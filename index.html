<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple Todo App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="todo-app">
    <h1>
      Todo List
      <span class="date">Feb 14, 2026</span>
    </h1>
    <p>What are your plans for the day?</p>
    <input id="task-input" type="text" placeholder="Enter a new task">
    <button id="add-btn">Add</button>
    <ul id="task-list"></ul>
  </div>
  <script src="script.js"></script>
</body>
</html>
